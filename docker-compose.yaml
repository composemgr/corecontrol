name: corecontrol
services:
  web:
    image: haedlessdev/corecontrol:latest
    container_name: corecontrol-web
    hostname: corecontrol-web
    restart: always
    pull_policy: always
    environment:
      JWT_SECRET: dOxZYTTZgXKMHkqLBIQVImayQXAVWdzGBPuFJKggzcgvgPJPXpWzqzKaUOIOGGIr
      DATABASE_URL: postgresql://corecontrol:corecontrol@corecontrol-db:5432/corecontrol
    ports:
      - '127.0.0.1:59022:3000'
    healthcheck:
      test: ['CMD-SHELL', 'nc -z 127.0.0.1 3000 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 90s
    depends_on:
      - db
      - agent
    networks:
      - corecontrol

  agent:
    image: haedlessdev/corecontrol-agent:latest
    container_name: corecontrol-agent
    hostname: corecontrol-agent
    restart: always
    pull_policy: always
    environment:
      DATABASE_URL: postgresql://corecontrol:corecontrol@corecontrol-db:5432/corecontrol
    depends_on:
      - db
    networks:
      - corecontrol

  db:
    image: postgres:17
    container_name: corecontrol-db
    hostname: corecontrol-db
    restart: always
    pull_policy: always
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_DB: corecontrol
      POSTGRES_USER: corecontrol
      POSTGRES_PASSWORD: corecontrol
    volumes:
      - /var/lib/srv/$USER/docker/haedlessdev/corecontrol/latest/rootf/data/db/postgres:/var/lib/postgresql/data:rw
    healthcheck:
      test:
        ['CMD', 'pg_isready', '-q', '-d', 'corecontrol', '-U', 'corecontrol']
      timeout: 45s
      interval: 10s
      retries: 10
    networks:
      - corecontrol

networks:
  corecontrol:
    name: corecontrol
    external: false
